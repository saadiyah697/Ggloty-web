<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Ggloty</title>
    <link rel="icon" type="image/png" href="images/fevicon-ggloty.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="masthead" id="masthead">
        <div class="masthead-bar">
            <a href="index.html" class="brand-logo">
                <img src="images/new1.png" alt="Ggloty" class="logo-img">
            </a>

            <nav class="primary-nav">
                <ul class="nav-list" id="navLinksMenu">
                    <li><a href="index.html#home" class="nav-item">The Vibe</a></li>
                    <li><a href="index.html#vision" class="nav-item">The Vision</a></li>
                    <li><a href="index.html#reels-section" class="nav-item">The Feed</a></li>
                    <li><a href="index.html#lookbook" class="nav-item">Lookbook</a></li>
                    
                </ul>
            </nav>

            <button class="menu-toggle" id="hamburgerToggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="navLinksMenu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
        </div>
    </header>
   
    <main class="contact-page-wrapper">
        <section id="contact" class="contact-section-wrapper">
            <div class="contact-purple-card" data-reveal>

                <div class="contact-layout-grid">

                    <div class="contact-visual-col">
                        <div class="contact-img-frame" style="background-image: url('https://images.pexels.com/photos/20181205/pexels-photo-20181205.jpeg');">
                            <div class="contact-floating-info">
                                <div class="info-item">
                                    <span class="info-icon">📍</span>
                                    <div>
                                        <h4>Footprint</h4>
                                        <p>Tamil Nadu</p>
                                    </div>
                                </div>
                                <div class="info-item">
                                    <span class="info-icon">✉️</span>
                                    <div>
                                        <h4>Support</h4>
                                        <p>Enquiriesggloty@gmail.com</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="contact-form-col">
                        <div class="form-header">
                            <span class="eyebrow eyebrow-plum">⚡ Get In Touch</span>
                            <h2>Contact Form</h2>
                        </div>

                        <form action="https://api.web3forms.com/submit" method="POST" class="contact-form-body" id="gglotyContactForm">

                            <input type="hidden" name="access_key" value="dd194a66-8516-4b38-a9fd-0f1071204d3c">
                            <input type="hidden" name="subject" value="New Contact Form Submission — Ggloty">
                            <input type="checkbox" name="botcheck" style="display: none;">

                            <div class="form-group">
                                <label for="fullName">Full Name</label>
                                <input type="text" id="fullName" name="name" class="luxury-input" placeholder="Enter your full name" required>
                            </div>

                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" class="luxury-input" placeholder="name@domain.com" required>
                            </div>

                            <div class="form-group">
                                <label for="message">Comment or message</label>
                                <textarea id="message" name="message" class="luxury-input" placeholder="Write your message here..." required></textarea>
                            </div>

                            <button type="submit" class="btn-glow btn-submit">
                                <span>Submit</span>
                            </button>

                            <p id="formResult" style="margin-top: 1rem; font-size: 0.95rem; font-weight: 600; text-align: center; display: none;"></p>
                        </form>
                    </div>

                </div>

            </div>
        </section>
    </main>
   
    <footer class="site-footer">
        <div class="footer-main">
            <a href="index.html" class="footer-brand">
                <img src="images/new1.png" alt="Ggloty" class="footer-logo">
            </a>

            <nav class="footer-nav">
                <a href="faq.html" class="active">FAQ</a>
                <a href="contact.html">Contact</a>
                <a href="terms.html">Terms & Conditions</a>
            </nav>

            <div class="footer-social">
                <a href="https://www.facebook.com/share/1JAfqFKw3F/" class="social-icon" aria-label="Facebook">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
                    </svg>
                </a>
                <a href="https://www.instagram.com/theggloty?utm_source=qr&igsh=OWNhNzVhZHdsa3Nk" class="social-icon" aria-label="Instagram">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
                <a href="https://x.com/GglotyOfficial" class="social-icon" aria-label="X / Twitter">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                    </svg>
                </a>
            </div>
        </div>

        <div class="footer-strip">
            <p class="strip-tagline">Organizing modern beauty infrastructure via advanced software systems</p>
            <p class="strip-copy">© 2026 Ggloty | All Rights Reserved</p>
        </div>
    </footer>
<script src="script.js"></script>
</body>
</html>
